name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run privacy:smoke
      - run: bun run smoke
      - run: bun run docs:smoke
      - run: bun run benchmark
      - run: bun run build
